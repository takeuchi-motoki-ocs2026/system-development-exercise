<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>注文履歴</title>

  <link rel="stylesheet"
    href="css/style.css">
</head>
<body>

<div class="container history-page">

  <!-- ヘッダー -->
  <header>

    <div class="time">
      残り時間 60分
    </div>

  </header>

  <!-- タイトル -->
  <h1 class="history-title">
    注文カゴ
  </h1>

  <!-- 注文一覧 -->
  <div class="history-list">

    <!-- 商品 -->
    <div class="history-row">

      <div class="history-item">

        <div class="history-info">

          <p class="item-name">
            ねぎま（塩）
          </p>

          <p class="item-price">
            150円
          </p>

        </div>

        <div class="item-count-control">
          <button class="qty-btn minus-btn">−</button>
          <div class="item-count">1</div>
          <button class="qty-btn plus-btn">+</button>
        </div>

      </div>

      <button class="delete-item-btn">
        🗑
      </button>

    </div>

    <!-- 商品 -->
    <div class="history-row">

      <div class="history-item">

        <div class="history-info">

          <p class="item-name">
            生ビール
          </p>

          <p class="item-price">
            0円
          </p>

        </div>

        <div class="item-count-control">
          <button class="qty-btn minus-btn">−</button>
          <div class="item-count">2</div>
          <button class="qty-btn plus-btn">+</button>
        </div>

      </div>

      <button class="delete-item-btn">
        🗑
      </button>

    </div>

  </div>

  <!-- 合計 -->
  <div class="total-area">
    合計　150円
  </div>

  <!-- ボタン -->
  <div class="cart-buttons">

    <button class="delete-all-btn">
      全て削除
    </button>
    
    <a href="confirm.html">
      <button class="confirm-btn">
        注文確定
      </button>
    </a>

  </div>

  <!-- フッター -->
  <footer>

    <a href="orderHome.html">
      <button>
        注文
      </button>
    </a>

    <a href="history.html">
      <button>
        注文履歴
      </button>
    </a>

    <a href="call.html">
      <button>
        店員呼出
      </button>
    </a>

    <a href="checkout.html">
      <button>
        会計
      </button>
    </a>

  </footer>

</div>

<script src="js/cart.js" defer></script>
</body>
</html>
