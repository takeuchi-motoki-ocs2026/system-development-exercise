<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホーム</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background-color: #e6b98a;

    /* --- フッターを下に押し出すための追加 --- */
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ヘッダーとフッター */
.header, .footer {
    height: 60px;
    background-color: #e0663f;

    /* 縮まないように固定 */
    flex-shrink: 0;
}

/* メインコンテンツ */
.container {
    padding: 20px;

    /* 余ったスペースをすべて埋めて、フッターを下に押し出す */
    flex: 1;
}

/* タイトル */
h2 {
    margin-bottom: 20px;
}

/* メニューボタン */
.menu-btn {
    display: block;
    width: 100%;

    /* paddingとborderを横幅(width:100%)に含める設定 */
    box-sizing: border-box;

    padding: 20px;
    margin-bottom: 20px;
    background-color: #d8cc8c;
    border: 1px solid #888;
    text-align: center;
    font-size: 18px;
}

/* ログアウトボタン */
.logout {
    background-color: red;
    color: white;
}
</style>
</head>

<body>

<div class="header"></div>

<div class="container">
    <h2>ホーム</h2>

    <div class="menu-btn" onclick="location.href='order-menu.html'">
        注文状況
    </div>

    <div class="menu-btn" onclick="location.href='seat-management.html'">
        座席管理
    </div>

    <div class="menu-btn" onclick="location.href='vacancy-management.html'">
        空席管理
    </div>

    <div class="menu-btn" onclick="location.href='order.html'">
        注文
    </div>

    <div class="menu-btn" onclick="location.href='menu-management.html'">
        メニュー管理
    </div>

    <div class="menu-btn logout" onclick="location.href='login.html'">
        ログアウト
    </div>
</div>

<div class="footer"></div>

</body>
</html>
