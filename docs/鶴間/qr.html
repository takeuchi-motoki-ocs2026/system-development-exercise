<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRコード</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#e6b98a;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

.header,
.footer{
    height:60px;
    background:#e0663f;
}

.container{
    flex:1;
    padding:20px;
}

h2{
    margin:15px 0;
}

.qr-box{
    width:230px;
    height:230px;
    margin:50px auto;
    background:#d3d3d3;
    border:1px solid #666;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:22px;
}

.seat-label{
    text-align:center;
    font-size:32px;
    margin-top:40px;
}

.back-btn{
    margin-top:60px;
    width:120px;
    padding:12px;
    background:#35c3e6;
    color:white;
    border:1px solid #666;
    font-size:20px;
}

</style>
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2>空席管理</h2>

    <div class="qr-box">
        QRコード
    </div>

    <div id="seatLabel" class="seat-label"></div>

    <button
        class="back-btn"
        onclick="history.back()">
        戻る
    </button>

</div>

<div class="footer"></div>

<script>

const params = new URLSearchParams(location.search);

const seatNo = params.get("seat");

document.getElementById("seatLabel").textContent =
    seatNo + "席";

</script>

</body>
</html>
