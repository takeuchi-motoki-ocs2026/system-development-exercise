<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>メニュー編集一覧</title>

<style>

body {

    margin: 0;

    font-family: sans-serif;

    background-color: #e6b98a;

    display: flex;

    flex-direction: column;

    min-height: 100vh;
}

/* ===== モーダル中スクロールロック ===== */

body.modal-open {

    overflow: hidden;
}

/* ===== ヘッダー・フッター ===== */

.header,
.footer {
    height: 80px;
    background-color: #e0663f;

    display: flex;
    justify-content: center;
    align-items: center;
}

.home-icon-btn {
    width: 70px;
    height: 70px;

    border: none;
    border-radius: 20px;

    background-color: #d9d9d9;

    font-size: 42px;
    color: #444;

    display: flex;
    justify-content: center;
    align-items: center;

    box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.7),
        0 2px 5px rgba(0,0,0,0.2);
}

/* ===== コンテンツ ===== */

.container {

    flex: 1;

    padding: 10px;
}

h2 {

    margin: 15px 0;

    font-size: 28px;
}

/* ===== テーブル ===== */

.menu-table {

    width: 100%;

    margin-top: 10px;

    border-collapse: collapse;

    background-color: #ddd;
}

.menu-table th {

    background-color: #999;

    color: white;

    border: 1px solid #555;

    padding: 15px 5px;

    font-size: 16px;

    height:50px;
}

.menu-table td {

    border: 1px solid #555;

    height: 60px;

    text-align: center;

    background-color: white;
}

/* ===== 列幅 ===== */

.menu-table th:nth-child(1),
.menu-table td:nth-child(1) {

    width: 68%;
}

.menu-table th:nth-child(2),
.menu-table td:nth-child(2) {

    width: 16%;
}

.menu-table th:nth-child(3),
.menu-table td:nth-child(3) {

    width: 16%;
}

/* ===== 編集ボタン ===== */

.edit-btn {

    width: 55px;

    height: 32px;

    background-color: black;

    color: white;

    border: none;

    font-size: 14px;

    cursor: pointer;
}

/* ===== 削除ボタン ===== */

.delete-btn {

    width: 55px;

    height: 32px;

    background-color: red;

    color: white;

    border: none;

    font-size: 14px;

    cursor: pointer;
}

/* ===== 戻るボタン ===== */

.back-btn {

    margin-top: 20px;

    width: 120px;

    padding: 12px;

    background-color: #35c3e6;

    color: white;

    border: 1px solid #666;

    font-size: 20px;

    cursor: pointer;
}

/* ===== キャンセル ===== */

.cancel-btn {

    width: 80px;

    background-color: #888;

    color: white;

    border: none;

    padding: 6px;

    cursor: pointer;
}

/* ===== OKボタン ===== */

.ok-btn {

    width: 80px;

    background-color: red;

    color: white;

    border: none;

    padding: 6px;

    cursor: pointer;
}

/* ===== モーダル ===== */

.modal {

    display: none;

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background-color: rgba(0,0,0,0.2);

    justify-content: center;

    align-items: center;

    z-index: 9999;
}

.modal-content {

    width: 90%;

    max-width: 320px;

    background-color: #eee;

    border: 1px solid #666;

    padding: 15px;

    box-sizing: border-box;
}

.modal-title {

    font-size: 14px;

    margin-bottom: 15px;
}

.modal-message {

    border: 1px solid #888;

    background-color: white;

    padding: 15px;

    margin-bottom: 15px;
}

.modal-question {

    text-align: center;

    margin-bottom: 10px;
}

.modal-product {

    text-align: left;
}

/* ===== モーダルボタン ===== */

.modal-buttons {

    display: flex;

    justify-content: flex-end;

    gap: 10px;
}

</style>
</head>

<body>

<!-- ===== ヘッダー ===== -->

<div class="header"></div>

<!-- ===== コンテンツ ===== -->

<div class="container">

    <h2>メニュー編集一覧</h2>

    <!-- ===== テーブル ===== -->

    <table class="menu-table">

        <thead>

            <tr>

                <th>商品名</th>

                <th>編集</th>

                <th>削除</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td></td>

                <td>

                    <button class="edit-btn"
                        onclick="editMenu()">

                        編集

                    </button>

                </td>

                <td>

                    <button class="delete-btn"
                        onclick="openDeleteModal(this)">

                        削除

                    </button>

                </td>

            </tr>

            <tr>

                <td></td>

                <td>

                    <button class="edit-btn"
                        onclick="editMenu()">

                        編集

                    </button>

                </td>

                <td>

                    <button class="delete-btn"
                        onclick="openDeleteModal(this)">

                        削除

                    </button>

                </td>

            </tr>

            <tr>

                <td></td>

                <td>

                    <button class="edit-btn"
                        onclick="editMenu()">

                        編集

                    </button>

                </td>

                <td>

                    <button class="delete-btn"
                        onclick="openDeleteModal(this)">

                        削除

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

    <!-- ===== 戻る ===== -->

    <button class="back-btn"
        onclick="location.href='menu-management.html'">

        戻る

    </button>

</div>

<!-- ===== フッター ===== -->

<div class="footer">

    <button class="home-icon-btn"
        onclick="location.href='home.html'">

        ⌂

    </button>

</div>

<!-- ===== 削除モーダル ===== -->

<div class="modal"
    id="deleteModal">

    <div class="modal-content">

        <!-- ===== タイトル ===== -->

        <div class="modal-title">

            確認

        </div>

        <!-- ===== メッセージ ===== -->

        <div class="modal-message">

            <div class="modal-question">

                本当に削除しますか？

            </div>

            <div class="modal-product">

                商品名：

            </div>

        </div>

        <!-- ===== ボタン ===== -->

        <div class="modal-buttons">

            <!-- ===== キャンセル ===== -->

            <button class="cancel-btn"
                onclick="closeDeleteModal()">

                キャンセル

            </button>

            <!-- ===== 削除 ===== -->

            <button class="ok-btn"
                onclick="completeDelete()">

                削除

            </button>

        </div>

    </div>

</div>

<script>

/* ===== 削除対象 ===== */

let deleteTarget = null;

/* ===== 編集 ===== */

function editMenu() {

    location.href =
        "menu-edit.html";
}

/* ===== モーダル表示 ===== */

function openDeleteModal(button) {

    deleteTarget = button;

    document.getElementById("deleteModal").style.display =
        "flex";

    document.body.classList.add(
        "modal-open"
    );
}

/* ===== モーダル閉じる ===== */

function closeDeleteModal() {

    document.getElementById("deleteModal").style.display =
        "none";

    document.body.classList.remove(
        "modal-open"
    );
}

/* ===== 削除実行 ===== */

function completeDelete() {

    if(deleteTarget) {

        deleteTarget.closest("tr").remove();
    }

    alert("削除しました");

    closeDeleteModal();
}

</script>

</body>
</html>
