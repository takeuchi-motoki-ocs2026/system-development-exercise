<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン</title>
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background-color: #e6b98a;
    /* --- フッターを下に押し出すための追加 --- */
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.header, .footer {
    height: 60px;
    background-color: #e0663f;
    /* 縮まないように固定 */
    flex-shrink: 0;
}

.container {
    text-align: center;
    padding: 40px 20px;
    /* 余ったスペースをすべて埋めて、フッターを下に押し出す */
    flex: 1;
}

h2 {
    margin-bottom: 30px;
}
input {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #888;
}
button {
    width: 80%;
    padding: 15px;
    margin-top: 30px;
    background-color: #d8cc8c;
    border: 1px solid #888;
    font-size: 16px;
}
</style>
</head>
<body>

<div class="header"></div>

<div class="container">
    <h2>ログイン</h2>

    <input type="text" placeholder="従業員ID"><br>
    <input type="password" placeholder="パスワード"><br>

    <button onclick="location.href='home.html'">ログイン</button>
</div>

<div class="footer"></div>

</body>
</html>
