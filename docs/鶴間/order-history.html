<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>注文履歴</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background-color:#e6b98a;

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* ヘッダーとフッター */
.header,
.footer {
    height: 80px;
    background-color: #e0663f;

    display: flex;
    justify-content: center;
    align-items: center;
}

.home-icon-btn {
    width: 70px;
    height: 70px;

    border: none;
    border-radius: 20px;

    background-color: #d9d9d9;

    font-size: 42px;
    color: #444;

    display: flex;
    justify-content: center;
    align-items: center;

    box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.7),
        0 2px 5px rgba(0,0,0,0.2);
}

/* メイン */
.container{
    flex:1;
    padding:10px;
}

/* タイトル */
h2{
    margin:15px 0;
}

/* 中央配置部分 */
.content{

    margin-top:80px;

    display:flex;
    flex-direction:column;

    align-items:center;
}

/* 席選択 */
.select-area{

    display:flex;

    align-items:center;

    gap:10px;
}

/* ドロップダウン */
.seat-select{

    width:100px;

    height:35px;

    font-size:18px;

    border:2px solid #3aa0ff;

    background:white;
}

/* ボタンエリア */
.btn-area{

    margin-top:20px;

    display:flex;

    gap:15px;
}

/* 戻るボタン */
.back-btn{

    width:80px;

    padding:12px;

    background-color:#35c3e6;

    color:white;

    border:1px solid #666;

    font-size:18px;
}

/* 履歴ボタン（メニュー追加の追加ボタンと同じ） */
.history-btn{

    width:80px;

    padding:12px;

    background-color:red;

    color:white;

    border:none;

    font-size:18px;

    cursor:pointer;
}

/* 無効状態（メニュー追加と同じ） */
.history-btn:disabled{

    background-color:#aaa;

    cursor:not-allowed;

    opacity:0.6;
}

</style>
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2>注文履歴</h2>

    <div class="content">

        <div class="select-area">

            <select class="seat-select" id="seatSelect">

                <option value=""></option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>

            </select>

            <span>席</span>

        </div>

        <div class="btn-area">

            <button class="back-btn"
                onclick="location.href='order-menu.html'">

                戻る

            </button>

            <button class="history-btn"
                    id="historyBtn"
                    disabled>

                履歴

            </button>

        </div>

    </div>

</div>

<div class="footer">

    <button class="home-icon-btn"
        onclick="location.href='home.html'">

        ⌂

    </button>

</div>

<script>

/* 席選択で有効化 */
document.getElementById("seatSelect")
.addEventListener("change", function(){

    const btn = document.getElementById("historyBtn");

    if(this.value !== ""){

        btn.disabled = false;

    }else{

        btn.disabled = true;
    }

});

</script>

</body>
</html>
